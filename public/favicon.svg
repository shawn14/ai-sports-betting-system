<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>

  <!-- Matrix grid pattern (3x3 grid with highlighted cells) -->
  <g opacity="0.4">
    <rect x="10" y="10" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="26" y="10" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="42" y="10" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="10" y="26" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="26" y="26" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="42" y="26" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="10" y="42" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="26" y="42" width="12" height="12" rx="2" fill="#60a5fa"/>
    <rect x="42" y="42" width="12" height="12" rx="2" fill="#60a5fa"/>
  </g>

  <!-- Highlighted active cells -->
  <g opacity="1">
    <rect x="10" y="10" width="12" height="12" rx="2" fill="#93c5fd"/>
    <rect x="42" y="26" width="12" height="12" rx="2" fill="#93c5fd"/>
    <rect x="26" y="42" width="12" height="12" rx="2" fill="#93c5fd"/>
  </g>

  <!-- PM letters with shadow -->
  <text x="32" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.95">PM</text>
</svg>
