<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- Matrix grid pattern -->
  <g opacity="0.2">
    <line x1="16" y1="0" x2="16" y2="64" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="32" y1="0" x2="32" y2="64" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="48" y1="0" x2="48" y2="64" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="16" x2="64" y2="16" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="32" x2="64" y2="32" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="48" x2="64" y2="48" stroke="#3b82f6" stroke-width="0.5"/>
  </g>

  <!-- PM letters -->
  <text x="32" y="44" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#3b82f6" text-anchor="middle">PM</text>
</svg>
